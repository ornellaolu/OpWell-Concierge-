<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OpWell Admin Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;1,400;1,500&family=DM+Sans:wght@200;300;400;500&display=swap" rel="stylesheet">
  <style>
    :root { --sage: #2D5A3D; --terracotta: #C8845A; --charcoal: #1C1C1C; --ivory: #FAF0E8; }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'DM Sans', sans-serif; background: var(--ivory); color: var(--charcoal); }
    nav { position: fixed; top: 0; left: 0; right: 0; z-index: 100; background: rgba(240,246,240,0.97); backdrop-filter: blur(12px); padding: 0 2rem; height: 72px; display: flex; align-items: center; border-bottom: 2px solid rgba(200,132,90,0.35); }
    .nav-logo { font-size: 24px; font-weight: 700; color: var(--sage); }
    .container { max-width: 1200px; margin: 100px auto 0; padding: 2rem; }
    h1 { font-family: 'Playfair Display', serif; font-size: 2rem; color: var(--sage); margin-bottom: 1rem; }
    .tabs { display: flex; gap: 1rem; margin: 2rem 0; border-bottom: 2px solid #eee; }
    .tab { padding: 0.75rem 1.5rem; background: none; border: none; color: #666; font-weight: 600; cursor: pointer; border-bottom: 3px solid transparent; margin-bottom: -2px; }
    .tab.active { color: var(--sage); border-bottom-color: var(--sage); }
    .content { display: none; }
    .content.active { display: block; }
    .analytics-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 1.5rem; margin: 2rem 0; }
    .card { background: #fff; border: 1px solid #ddd; border-radius: 8px; padding: 1.5rem; text-align: center; }
    .card-value { font-size: 2rem; font-weight: 700; color: var(--sage); }
    .card-label { font-size: 0.85rem; color: #666; margin-top: 0.5rem; }
    #login-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 1000; }
    #login-overlay.show { display: flex; align-items: center; justify-content: center; }
    .login-box { background: #fff; border-radius: 12px; padding: 3rem; max-width: 400px; box-shadow: 0 10px 40px rgba(0,0,0,0.3); }
    .login-box h2 { color: var(--sage); margin-bottom: 1.5rem; text-align: center; }
    .login-box input { width: 100%; padding: 0.75rem; margin-bottom: 1rem; border: 1px solid #ddd; border-radius: 6px; font-size: 1rem; }
    .login-box button { width: 100%; padding: 0.75rem; background: var(--sage); color: #fff; border: none; border-radius: 6px; font-weight: 600; cursor: pointer; font-size: 1rem; }
    .login-box button:hover { background: #1a2e22; }
    .login-error { color: #c41e3a; font-size: 0.9rem; margin-top: 0.5rem; display: none; }
  </style>
</head>
<body>
  <!-- Login Overlay -->
  <div id="login-overlay" class="show">
    <div class="login-box">
      <h2>🔐 Admin Login</h2>
      <input type="password" id="password-input" placeholder="Enter password" onkeypress="if(event.key==='Enter') checkPassword()">
      <button onclick="checkPassword()">Login</button>
      <div class="login-error" id="error-msg">Incorrect password</div>
    </div>
  </div>

  <nav>
    <div class="nav-logo">OpWell Admin</div>
  </nav>

  <div class="container">
    <h1>✅ Admin Dashboard - WORKING</h1>
    <p style="font-size: 18px; color: #666; margin-bottom: 2rem;">Welcome to OpWell Concierge admin</p>

    <div class="tabs">
      <button class="tab active" onclick="showTab('analytics')">📊 Analytics</button>
      <button class="tab" onclick="showTab('patients')">👥 Patients</button>
      <button class="tab" onclick="showTab('enroll')">➕ Enroll</button>
    </div>

    <div id="analytics" class="content active">
      <div class="analytics-grid">
        <div class="card">
          <div class="card-value">—</div>
          <div class="card-label">Total Patients</div>
        </div>
        <div class="card">
          <div class="card-value">—</div>
          <div class="card-label">Active</div>
        </div>
        <div class="card">
          <div class="card-value">—</div>
          <div class="card-label">Avg QoR-15</div>
        </div>
        <div class="card">
          <div class="card-value">0</div>
          <div class="card-label">Flagged</div>
        </div>
      </div>
    </div>

    <div id="patients" class="content" style="padding: 2rem; background: #fff; border-radius: 8px;">
      <h2 style="color: var(--sage);">Patient Management</h2>
      <div style="margin-top: 1rem;" id="patients-list"></div>
    </div>

    <div id="enroll" class="content" style="padding: 2rem; background: #fff; border-radius: 8px; max-width: 600px;">
      <h2 style="color: var(--sage); margin-bottom: 1rem;">Enroll New Patient</h2>
      <div id="enroll-message" style="display: none; padding: 1rem; border-radius: 6px; margin-bottom: 1rem;"></div>
      <form id="enroll-form" style="display: grid; gap: 1rem;">
        <div>
          <label style="display: block; font-weight: 600; color: var(--sage); margin-bottom: 0.5rem;">Full Name *</label>
          <input type="text" id="enroll-name" required style="width: 100%; padding: 0.75rem; border: 1px solid #ddd; border-radius: 6px;">
        </div>
        <div>
          <label style="display: block; font-weight: 600; color: var(--sage); margin-bottom: 0.5rem;">Email *</label>
          <input type="email" id="enroll-email" required style="width: 100%; padding: 0.75rem; border: 1px solid #ddd; border-radius: 6px;">
        </div>
        <div>
          <label style="display: block; font-weight: 600; color: var(--sage); margin-bottom: 0.5rem;">Phone *</label>
          <input type="tel" id="enroll-phone" required style="width: 100%; padding: 0.75rem; border: 1px solid #ddd; border-radius: 6px;">
        </div>
        <div>
          <label style="display: block; font-weight: 600; color: var(--sage); margin-bottom: 0.5rem;">Surgery Type *</label>
          <select id="enroll-surgery" required style="width: 100%; padding: 0.75rem; border: 1px solid #ddd; border-radius: 6px;">
            <option value="">Select surgery type...</option>
            <option value="BBL">BBL (Brazilian Butt Lift)</option>
            <option value="Tummy Tuck">Tummy Tuck</option>
            <option value="Bariatric">Bariatric / Weight Loss</option>
            <option value="C-Section">C-Section</option>
            <option value="Joint Replacement">Joint Replacement</option>
            <option value="Other">Other</option>
          </select>
        </div>
        <div>
          <label style="display: block; font-weight: 600; color: var(--sage); margin-bottom: 0.5rem;">Surgery Date *</label>
          <input type="date" id="enroll-date" required style="width: 100%; padding: 0.75rem; border: 1px solid #ddd; border-radius: 6px;">
        </div>
        <button type="button" onclick="enrollPatient()" style="padding: 0.75rem; background: var(--sage); color: #fff; border: none; border-radius: 6px; font-weight: 600; cursor: pointer; font-size: 1rem;">Enroll Patient</button>
      </form>
    </div>
  </div>

  <script>
    // Password protection
    const ADMIN_PASSWORD = 'Amoremio123!';

    function checkPassword() {
      const input = document.getElementById('password-input').value;
      const errorMsg = document.getElementById('error-msg');

      if (input === ADMIN_PASSWORD) {
        sessionStorage.setItem('admin-authenticated', 'true');
        document.getElementById('login-overlay').classList.remove('show');
      } else {
        errorMsg.style.display = 'block';
        document.getElementById('password-input').value = '';
      }
    }

    // Check if already authenticated
    window.addEventListener('load', function() {
      if (sessionStorage.getItem('admin-authenticated') === 'true') {
        document.getElementById('login-overlay').classList.remove('show');
      }
    });

    function showTab(tabName) {
      document.querySelectorAll('.content').forEach(c => c.classList.remove('active'));
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      document.getElementById(tabName).classList.add('active');
      event.target.classList.add('active');

      if (tabName === 'analytics') loadAnalytics();
      if (tabName === 'patients') loadPatients();
    }

    function enrollPatient() {
      const name = document.getElementById('enroll-name').value;
      const email = document.getElementById('enroll-email').value;
      const phone = document.getElementById('enroll-phone').value;
      const surgeryType = document.getElementById('enroll-surgery').value;
      const surgeryDate = document.getElementById('enroll-date').value;
      const msgDiv = document.getElementById('enroll-message');

      if (!name || !email || !phone || !surgeryType || !surgeryDate) {
        msgDiv.textContent = 'Please fill in all fields';
        msgDiv.style.background = '#fee2e2';
        msgDiv.style.color = '#991b1b';
        msgDiv.style.display = 'block';
        return;
      }

      fetch('/api/patient-register', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name, email, phone, surgeryType, surgeryDate })
      })
      .then(r => r.json())
      .then(data => {
        if (data.success) {
          msgDiv.textContent = `✅ Patient enrolled! Check-in link sent to ${email}`;
          msgDiv.style.background = '#dcfce7';
          msgDiv.style.color = '#166534';
          document.getElementById('enroll-form').reset();
          loadAnalytics();
        } else {
          msgDiv.textContent = `Error: ${data.error}`;
          msgDiv.style.background = '#fee2e2';
          msgDiv.style.color = '#991b1b';
        }
        msgDiv.style.display = 'block';
      })
      .catch(e => {
        msgDiv.textContent = `Error: ${e.message}`;
        msgDiv.style.background = '#fee2e2';
        msgDiv.style.color = '#991b1b';
        msgDiv.style.display = 'block';
      });
    }

    function loadAnalytics() {
      fetch('/api/admin-patients')
        .then(r => r.json())
        .then(data => {
          if (data.success) {
            const patients = data.patients || [];
            const now = new Date();
            const active = patients.filter(p => {
              const days = Math.floor((now - new Date(p.surgeryDate)) / (1000*60*60*24));
              return days >= 0 && days <= 28;
            }).length;
            document.querySelector('#analytics .analytics-grid > .card:nth-child(1) .card-value').textContent = patients.length;
            document.querySelector('#analytics .analytics-grid > .card:nth-child(2) .card-value').textContent = active;
            document.querySelector('#analytics .analytics-grid > .card:nth-child(3) .card-value').textContent = data.avgQor15Overall || '—';
          }
        })
        .catch(e => console.error('Error loading analytics:', e));
    }

    function loadPatients() {
      fetch('/api/admin-patients')
        .then(r => r.json())
        .then(data => {
          if (data.success) {
            const patients = data.patients || [];
            const patientsList = patients.map(p => {
              const lastCheckIn = p.lastCheckIn ? new Date(p.lastCheckIn).toLocaleString() : 'Never';
              const checkInStatus = p.lastCheckIn ? `✅ ${lastCheckIn}` : '❌ Never checked in';
              const surgeryDate = new Date(p.surgeryDate).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
              return `
                <div style="padding: 1rem; background: #fafafa; border: 1px solid #eee; border-radius: 6px; margin-bottom: 1rem;">
                  <div style="display: flex; justify-content: space-between; align-items: start;">
                    <div style="flex: 1;">
                      <h3 style="margin: 0 0 0.5rem; color: var(--sage); font-size: 1rem;">${p.name}</h3>
                      <p style="margin: 0.25rem 0; color: #666; font-size: 0.9rem;"><strong>Email:</strong> ${p.email}</p>
                      <p style="margin: 0.25rem 0; color: #666; font-size: 0.9rem;"><strong>Phone:</strong> ${p.phone}</p>
                      <p style="margin: 0.25rem 0; color: #666; font-size: 0.9rem;"><strong>Surgery:</strong> ${p.surgeryType} (${surgeryDate})</p>
                      <p style="margin: 0.5rem 0 0; color: #333; font-size: 0.85rem; font-family: monospace; background: #fff; padding: 0.5rem; border-radius: 4px; word-break: break-all;"><strong>Token:</strong> ${p.token}</p>
                    </div>
                    <div style="text-align: right;">
                      <p style="margin: 0 0 0.5rem; font-size: 0.9rem; padding: 0.5rem 1rem; border-radius: 4px; ${p.lastCheckIn ? 'background: #dcfce7; color: #166534;' : 'background: #fee2e2; color: #991b1b;'}">${checkInStatus}</p>
                      ${p.checkInsCount > 0 ? `<p style="margin: 0; color: #666; font-size: 0.85rem;"><strong>${p.checkInsCount}</strong> check-in${p.checkInsCount !== 1 ? 's' : ''}</p>` : ''}
                      ${p.latestQor15 ? `<p style="margin: 0.25rem 0 0; color: var(--sage); font-size: 0.85rem;"><strong>QoR-15:</strong> ${p.latestQor15}/150</p>` : ''}
                    </div>
                  </div>
                </div>
              `;
            }).join('');
            const patientsListDiv = document.getElementById('patients-list');
            patientsListDiv.innerHTML = patients.length ? patientsList : '<p style="color: #666;">No patients enrolled yet</p>';
          }
        })
        .catch(e => console.error('Error loading patients:', e));
    }

    // Load analytics on page load
    window.addEventListener('load', function() {
      if (sessionStorage.getItem('admin-authenticated') === 'true') {
        loadAnalytics();
      }
    });
  </script>
</body>
</html>
