<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard - OpWell Concierge</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --sage: #2D5A3D;
      --terracotta: #C8845A;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'DM Sans', sans-serif;
      background: #f5f5f5;
      color: #333;
      padding: 2rem;
    }
    .container { max-width: 600px; margin: 0 auto; background: white; border-radius: 8px; padding: 3rem; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
    h1 { font-family: 'Playfair Display', serif; color: var(--sage); margin-bottom: 2rem; font-size: 2rem; }
    .form-group { margin-bottom: 1.5rem; }
    label { display: block; font-weight: 600; color: var(--sage); margin-bottom: 0.5rem; }
    input, select { width: 100%; padding: 0.75rem; border: 1px solid #ddd; border-radius: 6px; font-family: 'DM Sans', sans-serif; font-size: 1rem; }
    input:focus, select:focus { outline: none; border-color: var(--terracotta); }
    button { width: 100%; background: var(--sage); color: white; padding: 1rem; border: none; border-radius: 6px; font-weight: 600; font-size: 1rem; cursor: pointer; }
    button:hover { background: #1a3a25; }
    .message { margin-top: 1rem; padding: 1rem; border-radius: 6px; display: none; }
    .success { background: #dcfce7; color: #166534; }
    .error { background: #fee2e2; color: #991b1b; }
  </style>
</head>
<body>

<div class="container">
  <h1>Enroll Patient</h1>
  <p style="color: #666; margin-bottom: 2rem;">Add a new patient to the recovery monitoring program</p>

  <form onsubmit="enrollPatient(event)">
    <div class="form-group">
      <label>Patient Name *</label>
      <input type="text" id="name" required>
    </div>

    <div class="form-group">
      <label>Email *</label>
      <input type="email" id="email" required>
    </div>

    <div class="form-group">
      <label>Phone *</label>
      <input type="tel" id="phone" required>
    </div>

    <div class="form-group">
      <label>Surgery Type *</label>
      <select id="surgery" required>
        <option value="">Select...</option>
        <option value="BBL">BBL (Brazilian Butt Lift)</option>
        <option value="Tummy Tuck">Tummy Tuck</option>
        <option value="Bariatric">Bariatric Surgery</option>
        <option value="Other">Other</option>
      </select>
    </div>

    <div class="form-group">
      <label>Surgery Date *</label>
      <input type="date" id="date" required>
    </div>

    <button type="submit">Enroll Patient & Send Email</button>
  </form>

  <div id="message" class="message"></div>
</div>

<script>
async function enrollPatient(e) {
  e.preventDefault();

  const name = document.getElementById('name').value;
  const email = document.getElementById('email').value;
  const phone = document.getElementById('phone').value;
  const surgery = document.getElementById('surgery').value;
  const date = document.getElementById('date').value;

  try {
    const res = await fetch('/api/patient-register', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        name, email, phone, surgeryType: surgery, surgeryDate: date
      })
    });

    const data = await res.json();
    const msgEl = document.getElementById('message');

    if (data.success) {
      msgEl.className = 'message success';
      msgEl.innerHTML = '✅ Patient enrolled! Recovery check-in link sent to ' + email;
      document.querySelector('form').reset();
    } else {
      msgEl.className = 'message error';
      msgEl.innerHTML = '❌ Error: ' + (data.error || 'Enrollment failed');
    }
    msgEl.style.display = 'block';
  } catch (err) {
    document.getElementById('message').className = 'message error';
    document.getElementById('message').innerHTML = '❌ Error: ' + err.message;
    document.getElementById('message').style.display = 'block';
  }
}
</script>

</body>
</html>
