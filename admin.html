<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OpWell Admin Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;1,400;1,500&family=DM+Sans:wght@200;300;400;500&display=swap" rel="stylesheet">
  <style>
    :root { --sage: #2D5A3D; --terracotta: #C8845A; --charcoal: #1C1C1C; --ivory: #FAF0E8; }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'DM Sans', sans-serif; background: var(--ivory); color: var(--charcoal); }
    nav { position: fixed; top: 0; left: 0; right: 0; z-index: 100; background: rgba(240,246,240,0.97); backdrop-filter: blur(12px); padding: 0 2rem; height: 72px; display: flex; align-items: center; border-bottom: 2px solid rgba(200,132,90,0.35); }
    .nav-logo { font-size: 24px; font-weight: 700; color: var(--sage); }
    .container { max-width: 1200px; margin: 100px auto 0; padding: 2rem; }
    h1 { font-family: 'Playfair Display', serif; font-size: 2rem; color: var(--sage); margin-bottom: 1rem; }
    .tabs { display: flex; gap: 1rem; margin: 2rem 0; border-bottom: 2px solid #eee; }
    .tab { padding: 0.75rem 1.5rem; background: none; border: none; color: #666; font-weight: 600; cursor: pointer; border-bottom: 3px solid transparent; margin-bottom: -2px; }
    .tab.active { color: var(--sage); border-bottom-color: var(--sage); }
    .content { display: none; }
    .content.active { display: block; }
    .analytics-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 1.5rem; margin: 2rem 0; }
    .card { background: #fff; border: 1px solid #ddd; border-radius: 8px; padding: 1.5rem; text-align: center; }
    .card-value { font-size: 2rem; font-weight: 700; color: var(--sage); }
    .card-label { font-size: 0.85rem; color: #666; margin-top: 0.5rem; }
    #login-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 1000; }
    #login-overlay.show { display: flex; align-items: center; justify-content: center; }
    .login-box { background: #fff; border-radius: 12px; padding: 3rem; max-width: 400px; box-shadow: 0 10px 40px rgba(0,0,0,0.3); }
    .login-box h2 { color: var(--sage); margin-bottom: 1.5rem; text-align: center; }
    .login-box input { width: 100%; padding: 0.75rem; margin-bottom: 1rem; border: 1px solid #ddd; border-radius: 6px; font-size: 1rem; }
    .login-box button { width: 100%; padding: 0.75rem; background: var(--sage); color: #fff; border: none; border-radius: 6px; font-weight: 600; cursor: pointer; font-size: 1rem; }
    .login-box button:hover { background: #1a2e22; }
    .login-error { color: #c41e3a; font-size: 0.9rem; margin-top: 0.5rem; display: none; }
  </style>
</head>
<body>
  <!-- Login Overlay -->
  <div id="login-overlay" class="show">
    <div class="login-box">
      <h2>🔐 Admin Login</h2>
      <input type="password" id="password-input" placeholder="Enter password" onkeypress="if(event.key==='Enter') checkPassword()">
      <button onclick="checkPassword()">Login</button>
      <div class="login-error" id="error-msg">Incorrect password</div>
    </div>
  </div>

  <nav>
    <div class="nav-logo">OpWell Admin</div>
  </nav>

  <div class="container">
    <h1>✅ Admin Dashboard - WORKING</h1>
    <p style="font-size: 18px; color: #666; margin-bottom: 2rem;">Welcome to OpWell Concierge admin</p>

    <div class="tabs">
      <button class="tab active" onclick="showTab('analytics')">📊 Analytics</button>
      <button class="tab" onclick="showTab('patients')">👥 Patients</button>
      <button class="tab" onclick="showTab('enroll')">➕ Enroll</button>
    </div>

    <div id="analytics" class="content active">
      <div class="analytics-grid">
        <div class="card">
          <div class="card-value">—</div>
          <div class="card-label">Total Patients</div>
        </div>
        <div class="card">
          <div class="card-value">—</div>
          <div class="card-label">Active</div>
        </div>
        <div class="card">
          <div class="card-value">—</div>
          <div class="card-label">Avg QoR-15</div>
        </div>
        <div class="card">
          <div class="card-value">0</div>
          <div class="card-label">Flagged</div>
        </div>
      </div>
    </div>

    <div id="patients" class="content" style="padding: 2rem; background: #fff; border-radius: 8px;">
      <h2 style="color: var(--sage);">Patient Management</h2>
      <p style="margin-top: 1rem; color: #666;">Patient search and management coming soon</p>
    </div>

    <div id="enroll" class="content" style="padding: 2rem; background: #fff; border-radius: 8px; max-width: 600px;">
      <h2 style="color: var(--sage); margin-bottom: 1rem;">Enroll Patient</h2>
      <p style="color: #666;">Enrollment feature coming soon</p>
    </div>
  </div>

  <script>
    // Password protection
    const ADMIN_PASSWORD = 'Amoremio123!';

    function checkPassword() {
      const input = document.getElementById('password-input').value;
      const errorMsg = document.getElementById('error-msg');

      if (input === ADMIN_PASSWORD) {
        sessionStorage.setItem('admin-authenticated', 'true');
        document.getElementById('login-overlay').classList.remove('show');
      } else {
        errorMsg.style.display = 'block';
        document.getElementById('password-input').value = '';
      }
    }

    // Check if already authenticated
    window.addEventListener('load', function() {
      if (sessionStorage.getItem('admin-authenticated') === 'true') {
        document.getElementById('login-overlay').classList.remove('show');
      }
    });

    function showTab(tabName) {
      document.querySelectorAll('.content').forEach(c => c.classList.remove('active'));
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      document.getElementById(tabName).classList.add('active');
      event.target.classList.add('active');
    }
  </script>
</body>
</html>
